name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ROS_DISTRO: humble

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/stereolabs_description

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-colcon-common-extensions \
            python3-rosdep \
            ros-humble-xacro

      - name: Initialize rosdep
        run: |
          rosdep init || true
          rosdep update

      - name: Install ROS dependencies
        run: |
          rosdep install --from-paths src --ignore-src -y

      - name: Build
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          colcon build --event-handlers console_cohesion+

      - name: Test (xacro parse + unit tests)
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          . install/setup.sh
          colcon test --event-handlers console_cohesion+
          colcon test-result --verbose

  xacro-standalone:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Install xacro
        run: apt-get update && apt-get install -y ros-humble-xacro
      - name: Validate all xacro files standalone
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          find . -name "*.urdf.xacro" | while read f; do
            echo "Checking: $f"
            xacro "$f" || exit 1
            xacro "$f" prefix:=test_ || exit 1
          done

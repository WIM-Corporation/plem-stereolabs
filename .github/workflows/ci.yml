name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ROS_DISTRO: humble

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/wim-corporation/ros-ci-humble:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/stereolabs_description

      - name: Install ROS dependencies
        run: |
          rosdep install --from-paths src --ignore-src -y

      - name: Build
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          colcon build --event-handlers console_cohesion+

      - name: Test (xacro parse + unit tests)
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          . install/setup.sh
          colcon test --event-handlers console_cohesion+
          colcon test-result --verbose

  xacro-standalone:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/wim-corporation/ros-ci-humble:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate all xacro files standalone
        run: |
          . /opt/ros/$ROS_DISTRO/setup.sh
          find . -name "*.urdf.xacro" | while read f; do
            echo "Checking: $f"
            xacro "$f" || exit 1
            xacro "$f" prefix:=test_ || exit 1
          done
